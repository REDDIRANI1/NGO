services:
  - type: web
    name: ngo-reports-api
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://YOUR_VERCEL_DOMAIN
      - key: DATABASE_URL
        fromDatabase:
          name: ngo-reports-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ngo-reports-redis
          type: redis
          property: connectionString

  - type: worker
    name: ngo-reports-worker
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile.worker
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ngo-reports-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ngo-reports-redis
          type: redis
          property: connectionString

databases:
  - name: ngo-reports-db
    plan: free

redis:
  - name: ngo-reports-redis
    plan: free

